<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login y Registro</title>
</head>
<body>

    <div class="form-container">
        <h2>Acceso / Registro</h2>
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="nickname">Nickname <span class="info">(Solo si se quiere registrar)</span>:</label>
                <input type="text" id="nickname" name="nickname">
            </div>

            <div class="buttons-container">
                <button type="submit" name="action" value="login">Iniciar Sesión</button>
                <button type="submit" name="action" value="register">Registrarse</button>
            </div>

        </form>
    </div>

</body>
</html>
